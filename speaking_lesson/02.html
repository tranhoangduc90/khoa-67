<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Speaking Flash Drill</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f4f7f6;
      margin: 0;
      padding: 18px;
      text-align: center;
      color: #222;
    }

    #card {
      background: white;
      width: 100%;
      max-width: 480px;
      min-height: 92vh;
      margin: 0 auto;
      padding: 18px;
      border-radius: 18px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 14px;
    }

    #top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: #666;
    }

    #counter, #level {
      background: #eef1f4;
      padding: 6px 10px;
      border-radius: 999px;
      font-weight: 600;
    }

    #task-box {
      background: #f8f9fa;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 12px;
      font-size: 15px;
      line-height: 1.45;
      text-align: left;
    }

    #task-box strong {
      color: #111;
    }

    #timer-wrapper {
      position: relative;
      width: 108px;
      height: 108px;
      margin: 4px auto;
    }

    #timer-svg {
      width: 108px;
      height: 108px;
      transform: rotate(-90deg);
    }

    .timer-bg {
      fill: none;
      stroke: #e9ecef;
      stroke-width: 8;
    }

    .timer-progress {
      fill: none;
      stroke: #007bff;
      stroke-width: 8;
      stroke-linecap: round;
      transition: stroke 0.2s;
    }

    #timer {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 38px;
      font-weight: 800;
      color: #007bff;
    }

    #timer-wrapper.ready .timer-progress {
      stroke: #dc3545;
    }

    #timer-wrapper.ready #timer {
      color: #dc3545;
      animation: pulse 0.6s ease-in-out 3;
    }

    #signal {
      min-height: 28px;
      font-size: 20px;
      font-weight: 800;
      color: #dc3545;
    }

    #question {
      font-size: 25px;
      font-weight: 700;
      line-height: 1.35;
      min-height: 130px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
    }

    #checklist {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 6px;
    }

    .check-item {
      flex: 1;
      background: #f8f9fa;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 10px 8px;
      font-size: 14px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      cursor: pointer;
      user-select: none;
    }

    .check-item input {
      width: 18px;
      height: 18px;
      accent-color: #007bff;
      cursor: pointer;
    }

    button {
      width: 100%;
      background: #007bff;
      color: white;
      border: none;
      padding: 16px;
      font-size: 18px;
      border-radius: 14px;
      cursor: pointer;
      font-weight: 800;
      box-shadow: 0 4px 8px rgba(0,123,255,0.22);
    }

    button:active {
      transform: scale(0.98);
    }

    .shake {
      animation: shake 0.35s;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    @keyframes shake {
      0% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      50% { transform: translateX(5px); }
      75% { transform: translateX(-5px); }
      100% { transform: translateX(0); }
    }

    @media (max-width: 380px) {
      #question {
        font-size: 22px;
      }

      #timer-wrapper,
      #timer-svg {
        width: 94px;
        height: 94px;
      }

      #timer {
        font-size: 34px;
      }

      #task-box {
        font-size: 14px;
      }

      #checklist {
        flex-direction: column;
        gap: 8px;
      }

      .check-item {
        font-size: 14px;
        padding: 9px;
      }
    }
  </style>
</head>

<body>

  <div id="card">
    <div>
      <div id="top-bar">
        <div id="level">Level: -</div>
        <div id="counter">Câu: 0/0</div>
      </div>

      <div id="task-box">
        <strong>Yêu cầu:</strong><br>
        Nói <strong>1 câu</strong>, trong đó chứa:<br>
        <strong>Paraphrase câu hỏi</strong> + <strong>Direct answer</strong>.
      </div>
    </div>

    <div>
      <div id="timer-wrapper">
        <svg id="timer-svg" viewBox="0 0 108 108">
          <circle class="timer-bg" cx="54" cy="54" r="46"></circle>
          <circle id="timer-progress" class="timer-progress" cx="54" cy="54" r="46"></circle>
        </svg>
        <div id="timer">5</div>
      </div>

      <div id="signal"></div>

      <div id="question">Nhấn nút bên dưới để bắt đầu luyện tập</div>

      <div id="checklist">
        <label class="check-item">
          <input type="checkbox" id="check-paraphrase">
          Paraphrase câu hỏi
        </label>

        <label class="check-item">
          <input type="checkbox" id="check-direct">
          Direct answer
        </label>
      </div>
    </div>

    <button id="btn-next" onclick="nextQuestion()">Start Drill 🎯</button>
  </div>

  <script>
    const EASY_QUESTIONS = [
      "Do you enjoy watching movies?",
      "Do you prefer tea or coffee?",
      "What’s your favorite color and why?",
      "What time do you usually wake up?",
      "If you could eat only one food for a week, what would it be?",
      "Would you rather be super fast or super strong? Why?"
    ];

    const MODERATE_QUESTIONS = [
      "Do you think it’s important to be on time?",
      "What kind of food do you usually eat when you're sad?",
      "What do you usually do to relax after a long day?",
      "How do you celebrate your birthday?",
      "If your phone could talk, what would it say about you?",
      "What would you do if your pet could talk for one day?"
    ];

    const CHALLENGING_QUESTIONS = [
      "Why do people enjoy watching reality shows?",
      "Why do some people find it hard to concentrate?",
      "Why do some people stay up late even if they’re tired?",
      "How does music affect your mood?",
      "If you were famous, what would it be for?"
    ];

    const CHALLENGING_RATIO = 0.5;
    const PREP_TIME = 5;

    let remainingQuestions = [];
    let currentCount = 0;
    let totalQuestions = 0;
    let animationFrame = null;

    const questionEl = document.getElementById("question");
    const counterEl = document.getElementById("counter");
    const levelEl = document.getElementById("level");
    const timerWrapperEl = document.getElementById("timer-wrapper");
    const timerEl = document.getElementById("timer");
    const signalEl = document.getElementById("signal");
    const cardEl = document.getElementById("card");
    const btnNext = document.getElementById("btn-next");
    const progressCircle = document.getElementById("timer-progress");

    const checkParaphrase = document.getElementById("check-paraphrase");
    const checkDirect = document.getElementById("check-direct");

    const radius = 46;
    const circumference = 2 * Math.PI * radius;

    progressCircle.style.strokeDasharray = circumference;
    progressCircle.style.strokeDashoffset = 0;

    function shuffleArray(array) {
      const copy = [...array];

      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }

      return copy;
    }

    function buildSessionQuestions() {
      const easy = EASY_QUESTIONS.map(q => ({ text: q, level: "Easy" }));
      const moderate = MODERATE_QUESTIONS.map(q => ({ text: q, level: "Moderate" }));

      const challengingCount = Math.ceil(CHALLENGING_QUESTIONS.length * CHALLENGING_RATIO);

      const selectedChallenging = shuffleArray(CHALLENGING_QUESTIONS)
        .slice(0, challengingCount)
        .map(q => ({ text: q, level: "Challenging" }));

      return shuffleArray([
        ...easy,
        ...moderate,
        ...selectedChallenging
      ]);
    }

    function resetChecklist() {
      checkParaphrase.checked = false;
      checkDirect.checked = false;
    }

    function resetTimerDisplay() {
      cancelAnimationFrame(animationFrame);

      timerEl.textContent = PREP_TIME;
      progressCircle.style.strokeDashoffset = 0;
      timerWrapperEl.classList.remove("ready");
      signalEl.textContent = "";
    }

    function init() {
      resetTimerDisplay();
      resetChecklist();

      remainingQuestions = buildSessionQuestions();
      currentCount = 0;
      totalQuestions = remainingQuestions.length;

      counterEl.textContent = `Câu: 0/${totalQuestions}`;
      levelEl.textContent = "Level: -";
      questionEl.textContent = "Nhấn nút bên dưới để bắt đầu luyện tập";

      btnNext.textContent = "Start Drill 🎯";
      btnNext.onclick = nextQuestion;
    }

    function startTimer() {
      cancelAnimationFrame(animationFrame);

      const duration = PREP_TIME * 1000;
      const startTime = performance.now();

      timerWrapperEl.classList.remove("ready");
      signalEl.textContent = "";
      progressCircle.style.strokeDashoffset = 0;

      function updateTimer(now) {
        const elapsed = now - startTime;
        const progress = Math.min(elapsed / duration, 1);

        const remainingMs = Math.max(duration - elapsed, 0);
        const remainingSeconds = Math.ceil(remainingMs / 1000);

        timerEl.textContent = remainingSeconds;
        progressCircle.style.strokeDashoffset = circumference * progress;

        if (progress < 1) {
          animationFrame = requestAnimationFrame(updateTimer);
        } else {
          timerEl.textContent = 0;
          progressCircle.style.strokeDashoffset = circumference;

          timerWrapperEl.classList.add("ready");
          signalEl.textContent = "Answer now!";

          cardEl.classList.remove("shake");
          void cardEl.offsetWidth;
          cardEl.classList.add("shake");

          if (navigator.vibrate) {
            navigator.vibrate([120, 80, 120]);
          }
        }
      }

      animationFrame = requestAnimationFrame(updateTimer);
    }

    function nextQuestion() {
      if (remainingQuestions.length === 0) {
        resetTimerDisplay();
        resetChecklist();

        questionEl.textContent = "Tuyệt vời! Đã hoàn thành bộ Drill.";
        counterEl.textContent = `Câu: ${totalQuestions}/${totalQuestions}`;
        levelEl.textContent = "Level: Done";
        timerEl.textContent = "✓";
        progressCircle.style.strokeDashoffset = circumference;
        signalEl.textContent = "";

        btnNext.textContent = "Restart Drill 🔄";
        btnNext.onclick = init;
        return;
      }

      resetChecklist();

      currentCount++;

      const nextItem = remainingQuestions.shift();

      counterEl.textContent = `Câu: ${currentCount}/${totalQuestions}`;
      levelEl.textContent = `Level: ${nextItem.level}`;
      questionEl.textContent = nextItem.text;

      btnNext.textContent = "Next Question ➜";

      startTimer();
    }

    init();
  </script>

</body>
</html>
