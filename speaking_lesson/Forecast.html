    // Database Engine: Parser
    let questionsDB = [];
    
    function parseDatabase() {
        const lines = rawData.split('\n')
                             .map(l => l.replace(/\\s*/g, '').trim())
                             .filter(l => l);
                             
        let currentPart = 0;
        let currentTopic = null;
        let readingP3Qs = false;
        
        let p1Count = 0;
        let p3Count = 0;

        for (const line of lines) {
            if (line.includes('Part 1')) {
                currentPart = 1;
                continue;
            }
            if (line.includes('Part 2 – Tổng hợp topic')) {
                currentPart = 3;
                if (currentTopic) questionsDB.push(currentTopic);
                currentTopic = null;
                continue;
            }

            const topicMatch = line.match(/^\d+\)\s+(.*)/);
            
            if (currentPart === 1) {
                if (topicMatch) {
                    if (currentTopic) questionsDB.push(currentTopic);
                    p1Count++;
                    let diff = p1Count <= 25 ? 'easy' : (p1Count <= 50 ? 'medium' : 'hard');
                    currentTopic = { id: 'p1_' + p1Count, part: 1, diff: diff, topic: topicMatch[1], questions: [] };
                } else if (currentTopic && line.endsWith('?')) {
                    // Loại bỏ câu hỏi nếu bắt đầu bằng describe
                    if (!line.toLowerCase().startsWith('describe') && !line.toLowerCase().startsWith('please describe') && !line.toLowerCase().startsWith('can you describe')) {
                        currentTopic.questions.push(line);
                    }
                }
            } else if (currentPart === 3) {
                if (topicMatch) {
                    if (currentTopic) questionsDB.push(currentTopic);
                    p3Count++;
                    let diff = p3Count <= 20 ? 'easy' : (p3Count <= 40 ? 'medium' : 'hard');
                    
                    // Cắt bỏ chữ "Describe " trên tiêu đề topic để tránh nhầm lẫn giao diện với Part 2
                    let topicTitle = topicMatch[1];
                    if (topicTitle.toLowerCase().startsWith('describe ')) {
                        topicTitle = topicTitle.substring(9);
                        topicTitle = topicTitle.charAt(0).toUpperCase() + topicTitle.slice(1);
                    }
                    
                    currentTopic = { id: 'p3_' + p3Count, part: 3, diff: diff, topic: topicTitle, questions: [] };
                    readingP3Qs = false;
                } else if (line.includes('Part 3 – Questions:')) {
                    readingP3Qs = true;
                } else if (readingP3Qs && currentTopic) {
                    if (!line.includes('Part 2') && !line.includes('Part 3')) {
                        // Loại bỏ câu hỏi nếu bắt đầu bằng describe
                        if (!line.toLowerCase().startsWith('describe')) {
                            currentTopic.questions.push(line);
                        }
                    }
                }
            }
        }
        if (currentTopic) questionsDB.push(currentTopic);
        
        // Filter empty topics
        questionsDB = questionsDB.filter(t => t.questions.length > 0);
        document.getElementById('debug-info').innerText = `Loaded ${questionsDB.length} topics from database.`;
    }

    // Initialize Database
    parseDatabase();

    // State Variables
    let sequenceStep = 0; // 0: P1 Easy, 1: P1 Easy, 2: P3 Easy, 3+: Random
    let usedTopicIds = new Set();
    let currentTopic = null;
    let currentQIndex = 0;

    // DOM Elements
    const elPart = document.getElementById('badge-part');
    const elDiff = document.getElementById('badge-diff');
    const elTopic = document.getElementById('topic-title');
    const elQuestion = document.getElementById('question-text');
    const elProgress = document.getElementById('progress');
    const elBtn = document.getElementById('next-btn');

    function getRandomItem(array) {
        if (array.length === 0) return null;
        return array[Math.floor(Math.random() * array.length)];
    }

    function getNextTopic() {
        let availablePool = [];

        if (sequenceStep === 0 || sequenceStep === 1) {
            availablePool = questionsDB.filter(q => q.part === 1 && q.diff === 'easy' && !usedTopicIds.has(q.id));
        } else if (sequenceStep === 2) {
            availablePool = questionsDB.filter(q => q.part === 3 && q.diff === 'easy' && !usedTopicIds.has(q.id));
        } else {
            availablePool = questionsDB.filter(q => !usedTopicIds.has(q.id));
        }

        if (availablePool.length === 0) {
            availablePool = questionsDB.filter(q => !usedTopicIds.has(q.id));
        }

        if (availablePool.length === 0) return null;

        const selected = getRandomItem(availablePool);
        usedTopicIds.add(selected.id);
        sequenceStep++;
        return selected;
    }

    function renderUI() {
        if (!currentTopic) {
            elQuestion.innerText = "You have completed all topics!";
            elTopic.innerText = "FINISHED";
            elBtn.style.display = 'none';
            return;
        }

        elPart.innerText = `Part ${currentTopic.part}`;
        elDiff.innerText = currentTopic.diff;
        
        elDiff.className = 'badge';
        if (currentTopic.diff === 'easy') elDiff.classList.add('badge-easy');
        else if (currentTopic.diff === 'medium') elDiff.classList.add('badge-medium');
        else elDiff.classList.add('badge-hard');

        elTopic.innerText = currentTopic.topic;
        elQuestion.innerText = currentTopic.questions[currentQIndex];
        elProgress.innerText = `Q: ${currentQIndex + 1}/${currentTopic.questions.length}`;
        elBtn.innerText = "Next Question";
    }

    function nextAction() {
        if (!currentTopic) {
            currentTopic = getNextTopic();
            currentQIndex = 0;
            renderUI();
            return;
        }

        currentQIndex++;
        
        if (currentQIndex >= currentTopic.questions.length) {
            currentTopic = getNextTopic();
            currentQIndex = 0;
        }
        
        renderUI();
    }
</script>
